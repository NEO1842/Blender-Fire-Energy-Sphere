name: 📋 Task
description: General task
title: "[Task]: "
labels: ["task", "triage"]

body:
  - type: textarea
    id: summary
    attributes:
      label: 📋 Summary
      description: What needs to be done?
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 🔥 Priority
      options:
        - Triage
        - Critical
        - High
        - Medium
        - Low
        - Backlog
    validations:
      required: true
